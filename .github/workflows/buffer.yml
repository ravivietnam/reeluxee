name: Render Reel Video zap

on:

  workflow_dispatch:
  schedule:
    - cron: '30 9 * * *'
    - cron: '30 10 * * *'
    - cron: '30 11 * * *'
    - cron: '30 12 * * *'
    - cron: '30 13 * * *'
    - cron: '30 14 * * *'

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    # --- TIME LIMIT ADDED HERE ---
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Run Everything
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          SHEETDB_URL: ${{ secrets.SHEETDB_URL }}
        run: |
          chmod +x buffer.sh
          ./buffer.sh
