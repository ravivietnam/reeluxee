name: Private Warehouse Sync
on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: # Allows you to click "Run Workflow" manually
  
jobs:
  sync-assets:
    runs-on: ubuntu-latest
    
    # Required for the script to manage files and potentially push changes
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history for better syncing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Smart Sync Script
        env:
          # These must be set in Settings > Secrets and variables > Actions
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          chmod +x sync_gdrive.sh
          ./sync_gdrive.sh
